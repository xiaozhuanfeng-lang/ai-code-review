name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write

env:
  REVIEW_SCRIPT: review_action.py

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run AI Review
        id: review
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 review_action.py
          echo "done"

      - name: Post Comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.number }}
        run: |
          gh pr comment $PR_NUM --body "$(cat /tmp/review_output.txt)"
