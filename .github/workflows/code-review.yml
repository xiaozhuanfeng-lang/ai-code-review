name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run AI Review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # Get PR diff and info
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          echo "PR Title: ${{ github.event.pull_request.title }}" > /tmp/pr_info.txt
          echo "PR Body: ${{ github.event.pull_request.body }}" >> /tmp/pr_info.txt
          echo "---DIFF---" >> /tmp/pr_info.txt
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD >> /tmp/pr_info.txt
          
          # Call AI API with Python
          python3 << 'PYEOF'
import subprocess, json, os, urllib.request

# Read diff
with open('/tmp/pr_info.txt') as f:
    content = f.read()

# Truncate
if len(content) > 8000:
    content = content[:8000] + "\n\n[...truncated]"

# Call OpenRouter
key = os.environ.get('OPENROUTER_KEY', '')
if not key:
    # Use direct review
    review = "ð´ Error: OPENROUTER_API_KEY secret not configured.\n\nPlease add it in Settings > Secrets and variables > Actions."
else:
    prompt = f"""You are a code reviewer. Review this PR:

{content}

Check:
1. Code quality (bugs, performance, code smells)
2. Security issues
3. Best practices
4. Maintainability

Output format: one issue per line with "â ï¸" or "ð´". If good, just "â LGTM". Keep concise."""

    payload = json.dumps({
        "model": "nvidia/nemotron-3-super-120b-a12b:free",
        "messages": [{"role": "user", "content": prompt}],
        "max_tokens": 1000,
        "temperature": 0.2
    }).encode()
    
    req = urllib.request.Request(
        "https://openrouter.ai/api/v1/chat/completions",
        data=payload,
        headers={
            "Authorization": f"Bearer {key}",
            "Content-Type": "application/json",
            "X-Title": "AI-Code-Review"
        }
    )
    
    try:
        resp = urllib.request.urlopen(req, timeout=60)
        result = json.loads(resp.read())
        review = result['choices'][0]['message']['content']
    except Exception as e:
        review = f"ð´ AI review failed: {str(e)[:100]}"

# Save for next step
with open('/tmp/review_result.txt', 'w') as f:
    f.write(review)

print("Review complete:")
print(review[:200] + "...")
PYEOF

          # Save result to env
          REVIEW=$(cat /tmp/review_result.txt)
          echo "REVIEW<<EOF" >> $GITHUB_ENV
          echo "$REVIEW" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = process.env.REVIEW || 'Review complete.';
            const comment = `## ð¤ AI Code Review\n\n${review.replace(/\n/g, '\n')}\n\n---\n*Powered by AI Code Review Bot*`;
            
            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            for (const c of existing) {
              if (c.body.includes('AI Code Review')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id
                });
              }
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
